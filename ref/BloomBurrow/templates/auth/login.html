{% extends "base.html" %}
{% block title %}Log In — Bloom Burrow{% endblock %}

{% block content %}
<section class="section section--auth">
  <div class="container container--narrow">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-icon">🌸</div>
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Log in to manage your bookings</p>
      </div>
      <form method="POST" class="form">
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" type="text" id="email" name="email" placeholder="you@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" name="password" placeholder="••••••••" required>
        </div>
        <div class="form-group form-group--inline">
          <label class="checkbox-label">
            <input type="checkbox" name="remember"> Remember me
          </label>
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg">Log In</button>
      </form>
      <p class="auth-footer">
        <a href="{{ url_for('forgot_password') }}" class="auth-link">Forgot your password?</a>
      </p>
      <p class="auth-footer">
        Don't have an account? <a href="{{ url_for('register') }}" class="auth-link">Sign up</a>
      </p>
    </div>
  </div>
</section>
{% endblock %}
