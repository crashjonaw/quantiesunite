{% extends "base.html" %}
{% block title %}Create Account — Bloom Burrow{% endblock %}

{% block content %}
<section class="section section--auth">
  <div class="container container--narrow">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-icon">🌷</div>
        <h1 class="auth-title">Create your account</h1>
        <p class="auth-subtitle">Start planning your flower bar experience</p>
      </div>
      <form method="POST" class="form">
        <div class="form-group">
          <label class="form-label" for="name">Full Name</label>
          <input class="form-input" type="text" id="name" name="name" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" type="email" id="email" name="email" placeholder="you@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" name="password" placeholder="Min. 6 characters" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm_password">Confirm Password</label>
          <input class="form-input" type="password" id="confirm_password" name="confirm_password" placeholder="Repeat password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg">Create Account</button>
      </form>
      <p class="auth-footer">
        Already have an account? <a href="{{ url_for('login') }}" class="auth-link">Log in</a>
      </p>
    </div>
  </div>
</section>
{% endblock %}
