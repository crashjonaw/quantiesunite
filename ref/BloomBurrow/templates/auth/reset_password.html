{% extends "base.html" %}
{% block title %}Reset Password — Bloom Burrow{% endblock %}

{% block content %}
<section class="section section--auth">
  <div class="container container--narrow">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-icon">🌸</div>
        <h1 class="auth-title">Set a new password</h1>
        <p class="auth-subtitle">Choose a strong password for your account</p>
      </div>
      <form method="POST" class="form">
        <div class="form-group">
          <label class="form-label" for="password">New Password</label>
          <input class="form-input" type="password" id="password" name="password" placeholder="Min. 6 characters" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm_password">Confirm Password</label>
          <input class="form-input" type="password" id="confirm_password" name="confirm_password" placeholder="Repeat password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg">Reset Password</button>
      </form>
      <p class="auth-footer">
        Back to <a href="{{ url_for('login') }}" class="auth-link">Log in</a>
      </p>
    </div>
  </div>
</section>
{% endblock %}
