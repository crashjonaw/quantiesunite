{% extends "base.html" %}
{% block title %}Forgot Password — Bloom Burrow{% endblock %}

{% block content %}
<section class="section section--auth">
  <div class="container container--narrow">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-icon">🔑</div>
        <h1 class="auth-title">Forgot your password?</h1>
        <p class="auth-subtitle">Enter your email and we'll send you a reset link</p>
      </div>
      <form method="POST" class="form">
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" type="email" id="email" name="email" placeholder="you@email.com" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg">Send Reset Link</button>
      </form>
      <p class="auth-footer">
        Remember your password? <a href="{{ url_for('login') }}" class="auth-link">Log in</a>
      </p>
    </div>
  </div>
</section>
{% endblock %}
